<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" role="img" aria-label="datashapeのアーキテクチャ図">
  <title>datashapeのアーキテクチャ</title>
  <style>
    .box { fill: none; stroke: #8b98a9; stroke-width: 1.5; }
    .accent-box { fill: none; stroke: #7c8cff; stroke-width: 1.5; }
    .label { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #6b7280; }
    .small { font: 400 11.5px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #6b7280; }
    .accent-label { font: 700 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #5566e0; }
    .arrow { stroke: #8b98a9; stroke-width: 1.5; fill: none; marker-end: url(#head); }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" fill="#8b98a9"/>
    </marker>
  </defs>

  <rect x="20" y="74" width="150" height="64" rx="8" class="box"/>
  <text x="40" y="100" class="label">入力テキスト</text>
  <text x="40" y="122" class="small">JSON / YAML / TOML</text>

  <rect x="240" y="74" width="150" height="64" rx="8" class="accent-box"/>
  <text x="260" y="100" class="accent-label">parse</text>
  <text x="260" y="122" class="small">共通のJS値へ</text>

  <rect x="460" y="20" width="150" height="64" rx="8" class="box"/>
  <text x="480" y="46" class="label">stringify</text>
  <text x="480" y="68" class="small">他形式へ書き出し</text>

  <rect x="460" y="116" width="150" height="64" rx="8" class="accent-box"/>
  <text x="480" y="142" class="accent-label">infer → codegen</text>
  <text x="480" y="164" class="small">スキーマ推論・型定義</text>

  <rect x="680" y="74" width="120" height="64" rx="8" class="box"/>
  <text x="700" y="100" class="label">出力</text>
  <text x="700" y="122" class="small">整形/型定義</text>

  <path class="arrow" d="M170 106 H232"/>
  <path class="arrow" d="M390 100 C420 92 430 56 452 52"/>
  <path class="arrow" d="M390 112 C420 132 430 146 452 150"/>
  <path class="arrow" d="M610 52 C645 60 650 90 678 100"/>
  <path class="arrow" d="M610 148 C645 140 650 116 678 108"/>
</svg>
